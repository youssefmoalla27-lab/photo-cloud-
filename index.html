<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upload Photos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f0f0f;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem;
}
h1 {
  font-size: 1.8rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  margin-bottom: 2.5rem;
  text-align: center;
}
.upload-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  background: #7c6af5;
  color: #fff;
  font-size: 0.95rem;
  font-family: inherit;
  font-weight: 500;
  border: none;
  border-radius: 12px;
  padding: 0.85rem 1.8rem;
  cursor: pointer;
  margin-bottom: 3rem;
  transition: opacity 0.15s, transform 0.1s;
}
.upload-btn:hover { opacity: 0.88; }
.upload-btn:active { transform: scale(0.97); }
.upload-btn input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.gallery {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.photo {
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes pop {
  from { opacity: 0; transform: scale(0.75); }
  to   { opacity: 1; transform: scale(1); }
}
.photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
</style>
</head>
<body>

<h1>Upload tes photos</h1>

<button class="upload-btn">
  <input type="file" accept="image/*" multiple onchange="add(this.files)" />
  + Ajouter des photos
</button>

<div class="gallery" id="gallery"></div>

<script>
function add(files) {
  Array.from(files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var div = document.createElement('div');
      div.className = 'photo';
      var img = document.createElement('img');
      img.src = e.target.result;
      div.appendChild(img);
      document.getElementById('gallery').prepend(div);
    };
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
